<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv='X-UA-Compatible' content='ie=edge'>
    <script src="../lib/vue.js"></script>
    <title>Document</title>
</head>

<body>
    <div id='app'>
        <input type="button" value="浪起来" @click="lang">
        <input type="button" value="停下来" @click="ting">
        <p>{{msg}}</p>
    </div>

    <script>
        var vm = new Vue({
            el: '#app',
            data: {
                msg:'猥琐发育,别浪！！！',
                interesting:null
            },
            methods: {
                lang(){    
                    if(this.interesting !=null){return;}//判断当前interesting是否为null

                     this.interesting =  setInterval( ()=> { //启动定时器
                        var st = this.msg.substring(0,1)
                        var wei = this.msg.substring(1)
                        this.msg = wei+st
                    },400)
                   
                },
                ting(){
                    clearInterval(this.interesting) //关闭定时器
                    this.interesting = null
                }
            },
        });
        
    </script>
</body>

</html>
